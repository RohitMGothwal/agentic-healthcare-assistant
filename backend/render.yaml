services:
  - type: web
    name: agentic-healthcare-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString

databases:
  - name: healthcare-db
    plan: free
