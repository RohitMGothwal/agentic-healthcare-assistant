services:
  - type: web
    name: agentic-healthcare-api
    runtime: python
    pythonVersion: 3.11
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
      - key: API_VERSION
        value: /api/v1

databases:
  - name: healthcare-db
    plan: free
    ipAllowList: []
